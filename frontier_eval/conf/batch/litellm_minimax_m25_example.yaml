version: 1

# Minimal example for LiteLLM virtual-key access via Frontier Eval's
# OpenAI-compatible LLM config.
#
# Usage:
#   export LITELLM_VIRTUAL_KEY=sk-...
#   python -m frontier_eval.batch --matrix frontier_eval/conf/batch/litellm_minimax_m25_example.yaml
#
# Notes:
# - The LiteLLM-exposed model id for MiniMax 2.5 is `minimax-m2.5`
#   for this gateway/key, not `minimax-2.5`.
# - Replace `tasks` / `algorithms` with your real batch combinations.

tasks:
  - smoke

algorithms:
  - name: openevolve
    overrides:
      - algorithm.iterations=1

llms:
  - name: litellm__minimax_m25
    api_base: https://litellm.nbdevenv.xiaoaojianghu.fun/v1
    model: minimax-m2.5
    api_key_env: LITELLM_VIRTUAL_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: litellm_minimax_m25_demo
  base_dir: runs/batch
  max_parallel: 1
  fail_fast: false
