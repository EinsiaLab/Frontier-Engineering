version: 1

# GPU tasks that are already validated on this machine.
#
# Recommended launch:
#   CUDA_VISIBLE_DEVICES=4 conda run -n frontier-eval-2 python -m frontier_eval.batch \
#     --matrix frontier_eval/conf/batch/v1_gpu_openevolve_qwen3codernext_100.yaml

tasks:
  - name: unified
    label: Robotics/QuadrupedGaitOptimization
    overrides:
      - task.benchmark=Robotics/QuadrupedGaitOptimization
      - task.runtime.conda_env=motion

  - name: unified
    label: Robotics/RobotArmCycleTimeOptimization
    overrides:
      - task.benchmark=Robotics/RobotArmCycleTimeOptimization
      - task.runtime.conda_env=motion

  - name: unified
    label: Aerodynamics/CarAerodynamicsSensing
    overrides:
      - task.benchmark=Aerodynamics/CarAerodynamicsSensing
      - task.runtime.conda_env=optics

algorithms:
  - name: openevolve
    overrides:
      - algorithm.iterations=100
      - algorithm.oe.evaluator.timeout=600

llms:
  - name: openai__qwen3_coder_next
    api_base: ${oc.env:OPENAI_API_BASE,https://api.openai.com/v1}
    model: qwen3-coder-next
    api_key_env: OPENAI_API_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: v1_gpu_openevolve_qwen3codernext_100
  base_dir: runs/batch
  max_parallel: 1
  fail_fast: false
