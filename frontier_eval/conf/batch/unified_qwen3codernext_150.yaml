algorithms:
  - name: shinkaevolve
    overrides:
      - algorithm.max_generations=150
      - algorithm.evaluator_timeout_s=300
  - name: openevolve
    overrides:
      - algorithm.iterations=150
      - algorithm.oe.evaluator.timeout=300
  - name: abmcts
    overrides:
      - algorithm.iterations=150
      - algorithm.variant=m
      - algorithm.evaluator_timeout_s=300

llms:
  - name: openai__qwen3_coder_next
    api_base: ${oc.env:OPENAI_API_BASE,https://api.openai.com/v1}
    model: qwen3-coder-next
    api_key_env: OPENAI_API_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: unified_qwen3codernext_150
  base_dir: runs/batch
  max_parallel: 1
  fail_fast: false
