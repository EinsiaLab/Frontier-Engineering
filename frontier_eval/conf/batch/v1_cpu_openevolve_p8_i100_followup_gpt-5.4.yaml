version: 1

# Focused revalidation batch for tasks with anomaly follow-up fixes or
# explicitly requested cryptographic rechecks.

tasks:
  - name: unified
    label: QuantumComputing/task_01_routing_qftentangled
    overrides:
      - task.benchmark=QuantumComputing/task_01_routing_qftentangled
      - task.runtime.conda_env=mqt

  - name: unified
    label: QuantumComputing/task_02_clifford_t_synthesis
    overrides:
      - task.benchmark=QuantumComputing/task_02_clifford_t_synthesis
      - task.runtime.conda_env=mqt

  - name: unified
    label: QuantumComputing/task_03_cross_target_qaoa
    overrides:
      - task.benchmark=QuantumComputing/task_03_cross_target_qaoa
      - task.runtime.conda_env=mqt

  - name: unified
    label: Cryptographic/AES-128
    overrides:
      - task.benchmark=Cryptographic/AES-128

  - name: unified
    label: Cryptographic/SHA-256
    overrides:
      - task.benchmark=Cryptographic/SHA-256

  - name: unified
    label: Cryptographic/SHA3-256
    overrides:
      - task.benchmark=Cryptographic/SHA3-256

  - name: unified
    label: CommunicationEngineering/LDPCErrorFloor
    overrides:
      - task.benchmark=CommunicationEngineering/LDPCErrorFloor

  - name: unified
    label: CommunicationEngineering/PMDSimulation
    overrides:
      - task.benchmark=CommunicationEngineering/PMDSimulation

  - name: unified
    label: CommunicationEngineering/RayleighFadingBER
    overrides:
      - task.benchmark=CommunicationEngineering/RayleighFadingBER

algorithms:
  - name: openevolve
    overrides:
      - algorithm.iterations=100
      - algorithm.oe.evaluator.timeout=300

llms:
  - name: litellm__gpt-5.4
    api_base: ${oc.env:OPENAI_API_BASE,https://litellm.nbdevenv.xiaoaojianghu.fun/v1}
    model: gpt-5.4
    api_key_env: OPENAI_API_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: v1_cpu_openevolve_p8_i100_followup_gpt-5.4
  base_dir: runs/batch
  max_parallel: 8
  fail_fast: false
