version: 1

# Dedicated batch for FlashAttention.
#
# Keep it separate from the other GPU tasks so kernel compilation / large tensors
# do not contend with robotics or PhySense runs.
#
# Recommended launch:
#   CUDA_VISIBLE_DEVICES=5 conda run -n frontier-eval-2 python -m frontier_eval.batch \
#     --matrix frontier_eval/conf/batch/v1_flashattention_openevolve_qwen3codernext_100.yaml

tasks:
  - name: unified
    label: KernelEngineering/FlashAttention
    overrides:
      - task.benchmark=KernelEngineering/FlashAttention
      - task.runtime.conda_env=optics

algorithms:
  - name: openevolve
    overrides:
      - algorithm.iterations=100
      - algorithm.oe.evaluator.timeout=1200

llms:
  - name: openai__qwen3_coder_next
    api_base: ${oc.env:OPENAI_API_BASE,https://api.openai.com/v1}
    model: qwen3-coder-next
    api_key_env: OPENAI_API_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: v1_flashattention_openevolve_qwen3codernext_100
  base_dir: runs/batch
  max_parallel: 1
  fail_fast: false
