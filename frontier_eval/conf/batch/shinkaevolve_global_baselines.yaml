version: 1

# Global ShinkaEvolve baseline-only sweep.
#
# Selection policy:
# - Prefer unified benchmark entries whenever both a unified and native task
#   implementation exist for the same benchmark.
# - Add native-only Hydra tasks after all unified entries.
#
# Unified-preferred overlaps intentionally excluded from the native section:
# - `engdesign` -> prefer benchmark `EngDesign`
# - `malloclab` -> prefer benchmark `ComputerSystems/MallocLab`
# - `battery_fast_charging_profile` -> prefer benchmark `EnergyStorage/BatteryFastChargingProfile`
# - `battery_fast_charging_spme` -> prefer benchmark `EnergyStorage/BatteryFastChargingSPMe`
# - `molecular_mechanics_*` -> prefer the corresponding `MolecularMechanics/*` benchmarks

tasks:
  # Unified benchmarks
  - name: unified
    label: CommunicationEngineering/LDPCErrorFloor
    overrides:
      - task.benchmark=CommunicationEngineering/LDPCErrorFloor
  - name: unified
