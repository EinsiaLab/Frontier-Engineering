version: 1

# Non-unified task sweep for the 23 legacy task configs under `frontier_eval/conf/task/`
# whose `name:` is not `unified`.

tasks:
  - car_aerodynamics_sensing
  - crypto_aes128
  - crypto_sha256
  - crypto_sha3_256
  - denoising
  - dynamic_obstacle_navigation
  - flash_attention
  - high_reliable_simulation
  - iscso2015
  - iscso2023
  - malloclab
  - manned_lunar_landing
  - mla
  - muon_tomography
  - perturbation_prediction
  - pid_tuning
  - predict_modality
  - quadruped_gait
  - robot_arm_cycle_time
  - smoke
  - topology_optimization
  - trimul
  - uav_inspection_coverage

algorithms:
  - name: shinkaevolve
    overrides:
      - algorithm.max_generations=150
      - algorithm.evaluator_timeout_s=300
  - name: openevolve
    overrides:
      - algorithm.iterations=150
      - algorithm.oe.evaluator.timeout=300
  - name: abmcts
    overrides:
      - algorithm.iterations=150
      - algorithm.variant=m
      - algorithm.evaluator_timeout_s=300

llms:
  - name: openai__qwen3_coder_next
    api_base: ${oc.env:OPENAI_API_BASE,https://api.openai.com/v1}
    model: qwen3-coder-next
    api_key_env: OPENAI_API_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: nonunified_qwen3codernext_150
  base_dir: runs/batch
  max_parallel: 1
  fail_fast: false
